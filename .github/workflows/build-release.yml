name: Build Release Packages

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10
  workflow_dispatch: # Allow manual triggering

jobs:
  build:
    name: Build standalone for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
        include:
          - os: macos-latest
            platform_arg: macos
            asset_name: Wenku8Downloader-macOS.zip
          - os: windows-latest
            platform_arg: windows
            asset_name: Wenku8Downloader-Windows.zip

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # We need playwright to let build script fetch Chromium into our standalone package
          pip install playwright 

      # Run the cross-platform packager script we made
      - name: Package Standalone Release
        run: python tools/build_release.py ${{ matrix.platform_arg }}

      # Upload the Artifact for the release
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: release/${{ matrix.asset_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
